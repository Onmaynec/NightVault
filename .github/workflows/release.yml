name: Build and publish NightVault

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Verify project
        run: npm run verify

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build unsigned artifacts for manual run
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run dist -- --publish never

      - name: Build and publish tagged release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run dist -- --publish always

      - name: Create SHA-256 checksums
        shell: pwsh
        run: |
          Get-ChildItem dist -File | Where-Object { $_.Extension -in '.exe','.yml','.blockmap' } |
            ForEach-Object { "{0} *{1}" -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower(), $_.Name } |
            Set-Content dist/SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NightVault-Windows-${{ github.ref_name }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
            dist/SHA256SUMS.txt
